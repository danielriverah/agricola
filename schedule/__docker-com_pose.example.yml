# Ejemplo de integracion en el stack. Ajusta a tu stack real.
# El microservicio schedule se despliega como contenedor independiente.
services:
  schedule:
    build: ./schedule
    env_file:
      - ./schedule/.env
    ports:
      - "5200:5200"
    depends_on:
      - mysql
    networks:
      - app-network

  # Referencias de ejemplo (probablemente ya existen en tu stack):
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: agricola
    networks:
      - app-network

  # DynamoDB local opcional para desarrollo:
  dynamodb-local:
    image: amazon/dynamodb-local
    command: "-jar DynamoDBLocal.jar -sharedDb"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
